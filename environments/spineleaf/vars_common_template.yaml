{% set gs = env.global_services %}
system:
  memory_thresholds: { minor: 96, severe: 97, critical: 98 }
  ssh_login_attempts: "{{ gs.ssh.authentication_retries }}"
  domain_name: "{{ gs.domain_name }}"
  disable_ip_domain_lookup: {{ not gs.dns.domain_lookup }}
  timezone: "{{ gs.timezone }}"

local_users:
  - username: admin
    password_hash: "{{ env.local_admin_hash }}"
    role: network-admin
    passphrase: { lifetime_days: 45, warn_days: 14, grace_days: 3 }
  - username: netops
    password_hash: "{{ env.local_netops_hash }}"
    role: network-operator
    passphrase: { lifetime_days: 99999, warn_days: 14, grace_days: 3 }

banner: |
{{ gs.banner.motd | indent(6, true) }}

radius:
  servers:
{% for server in gs.aaa.radius.servers %}
    - name: "{{ server.name }}"
      ip: "{{ server.ip }}"
      key: "{{ server.key }}"
      vrf: management
{% endfor %}
  timeout: {{ gs.aaa.radius.timeout }}
  retransmit: {{ gs.aaa.radius.retransmit }}
  deadtime: {{ gs.aaa.radius.deadtime }}
  group_name: RadiusServers
  source_interface: "{{ gs.aaa.radius.source_interface }}"

aaa:
  authentication:
    login_default: RadiusServers local
    login_console: RadiusServers local
    enable_default: RadiusServers local
  authorization:
    exec_default: RadiusServers local
    commands_default: RadiusServers local
  accounting_default: RadiusServers
  accounting_exec: {{ gs.aaa.accounting.exec }}
  accounting_commands: {{ gs.aaa.accounting.commands }}
  on_success_log: true
  on_failure_log: true
  login_error_enable: true
  user_default_role_disabled: true

certificates:
  trustpoint: DEMO-CA
  rsa_label: NXOS-FABRIC-DEMO
  modulus: 2048
  enrollment: terminal
  revocation_check: none

mgmt_object_group:
  name: mgmt_nets
  networks:
{% for subnet in gs.management_acl.allowed_subnets %}
    - "{{ subnet }}"
{% endfor %}

acls:
  mgmt_in:
    - { seq: 10, remark: "Permit approved management networks" }
    - { seq: 20, permit: "ip addrgroup mgmt_nets any" }
    - { seq: 30, permit: "tcp any any established" }
    - { seq: 50, deny: "ip any any log" }
  mgmt_out:
    - { seq: 10, remark: "Permit return traffic to approved management networks" }
    - { seq: 20, permit: "ip any addrgroup mgmt_nets" }
    - { seq: 50, deny: "ip any any" }

acl_logging: { enabled: true, cache_interval: 300, cache_entries: 8000, detailed: true, rate_limiter_pps: 50 }

qos:
  enable: true
  ingress_policy: FABRIC-TRUST-DSCP
  egress_policy: FABRIC-8Q-OUT
  ingress_mapping:
    - { class: NETWORK-CONTROL, set_qos_group: 7 }
    - { class: REALTIME, set_qos_group: 6 }
    - { class: CRITICAL-OPERATIONAL, set_qos_group: 5 }
    - { class: TRANSACTIONAL-DATA, set_qos_group: 2 }
    - { class: BEST-EFFORT, set_qos_group: 1 }
    - { class: class-default, set_qos_group: 1 }
  egress_classes:
    - { name: c-out-8q-q7, priority_level: 1 }
    - { name: c-out-8q-q6, bw_rem_pct: 20 }
    - { name: c-out-8q-q5, bw_rem_pct: 20 }
    - { name: c-out-8q-q2, bw_rem_pct: 20 }
    - { name: c-out-8q-q1, bw_rem_pct: 20 }
    - { name: c-out-8q-q-default, bw_rem_pct: 20 }

copp_profile: strict
bfd: { interval: 100, min_rx: 150, multiplier: 3 }

snmp:
  contact: "{{ gs.snmp.contact }}"
  location: "{{ gs.snmp.location }}"
  source_interface: "{{ gs.snmp.source_interface }}"
  users:
{% for user in gs.snmp.users %}
    - name: "{{ user.username }}"
      role: network-operator
      auth: "{{ user.auth_protocol }}"
      auth_password: "{{ user.auth_password }}"
      priv: "{{ user.priv_protocol }}"
      priv_password: "{{ user.priv_password }}"
{% endfor %}
  traps:
{% for trap in gs.snmp.trap_receivers %}
    - host: "{{ trap.ip }}"
      version: 3
      vrf: management
      user: "{{ gs.snmp.users[0].username }}"
      source_interface: "{{ gs.snmp.source_interface }}"
{% endfor %}
  enable_traps:
    - config ccmCLIRunningConfigChanged
    - snmp authentication
    - lldp lldpRemTablesChange
    - syslog message-generated

ntp:
  servers:
{% for server in gs.ntp.servers %}
    - ip: "{{ server.ip }}"
      vrf: management
{% if server.prefer | default(false) %}
      prefer: true
{% endif %}
{% endfor %}
  source_interface: "{{ gs.ntp.source_interface }}"
  logging: true
{% if gs.ntp.authentication.enabled %}
  authentication_key:
    id: {{ gs.ntp.authentication.key_id }}
    algorithm: "{{ gs.ntp.authentication.algorithm }}"
    value: "{{ gs.ntp.authentication.secret }}"
{% endif %}

logging:
  console: 5
  monitor: 6
  buffered: { size: 4096000, level: warnings }
  logfile: { name: log_file, severity: 6, size: 4096000 }
  servers:
{% for server in gs.syslog.servers %}
    - ip: "{{ server.ip }}"
      severity: "{{ server.severity }}"
      vrf: management
      secure: true
      protocol: "{{ server.protocol }}"
      port: {{ server.port }}
{% endfor %}
  source_interface: "{{ gs.syslog.source_interface }}"
  timestamp: milliseconds
  module: 3
  secure_ocsp_strict: false
  login_on_success: true
  aaa_error_enable: true

boot: { image: nxos64-cs.10.3.6.M.bin, source_interface: mgmt0 }
storm_control: { broadcast_level: 5.0, unicast_level: 5.0, action: trap }

stp:
  mode: rapid-pvst
  edge_default: true
  bpduguard_default: true
  priorities: { spine: 4096, leaf: 24576, default: 32768 }

features: [scp-server, lacp, lldp, bfd, bgp, nv overlay, pim, msdp, interface-vlan]
password_encryption_aes: true
password_strength_check: true
password_minimum_length: 14


