fabric_name: NXOS-MULTISITE-SUPERSPINE-FABRIC
super_spines_per_pod: 2
spines_per_pod: 4
leaves_per_pod: 8
servers_per_leaf: 10
xr_routers_per_site: 2
border_leaf_ids: [7, 8]
hardware:
  leaf: Cisco Nexus 93180YC-FX3
  border_leaf: Cisco Nexus 93180YC-FX3
  spine: Cisco Nexus 9364C-GX
  super_spine: Cisco Nexus 9364C-GX
  dci_core: Cisco IOS-XR routers
speeds:
  server_to_leaf: "25000"
  leaf_to_spine: "100000"
  spine_to_super_spine: "100000"
  pod_to_pod_super_spine: "100000"
  border_leaf_to_xr: "100000"
  xr_to_xr_dci: "100000 or 400000"
sites:
  - name: DC1
    site_id: 1
    management_subnet: 192.0.2.0/24
    pods:
      - name: pod1
        pod_id: 1
      - name: pod2
        pod_id: 2
  - name: DC2
    site_id: 2
    management_subnet: 198.51.100.0/24
    pods:
      - name: pod1
        pod_id: 1
      - name: pod2
        pod_id: 2
  - name: DC3
    site_id: 3
    management_subnet: 203.0.113.0/24
    pods:
      - name: pod1
        pod_id: 1
      - name: pod2
        pod_id: 2
