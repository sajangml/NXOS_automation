! ======================================================
! AUTO-GENERATED NX-OS CONFIGURATION - DO NOT EDIT
! Hostname: DC1-P1-LF07
! Fabric ID: DC1-P1-LF07
! Role: BORDER_LEAF
! Platform: Cisco Nexus 93180YC-FX3
! ASIC Family: CloudScale FX3
! Rack Role: Dedicated border rack pair
! Site: DC1 / pod1
! Management IP: 10.1.100.165/25
! Design Note: Border gateway leaf: server-facing ports Eth1/1-10, fabric uplinks Eth1/49-52, XR/core uplinks Eth1/53-54.
! Corrected Rule: Super-spines do not connect directly to XR/core.
! Border Rule: Leaf 7 and Leaf 8 provide XR/core handoff using Eth1/53-Eth1/54.
! Inter-DC XR Ring: DC1-XR connects to DC2-XR, DC2-XR connects to DC3-XR, and DC3-XR connects back to DC1-XR.
! ======================================================

hostname DC1-P1-LF07

! ---- System & Features ----
feature scp-server
feature lacp
feature lldp
feature bfd
feature bgp
feature nv overlay
nv overlay evpn
feature pim
feature interface-vlan

fabric forwarding anycast-gateway-mac 0000.2222.3333

! ---- System Clock & SSH ----
clock timezone Australia/Melbourne
ssh login-attempts 3
ssh source-interface loopback0
ssh key rsa 2048
ip ssh version 2


system memory-threshold minor 96
system memory-threshold severe 97
system memory-threshold critical 98

! ---- RSA & Certificate Enrollment ----
crypto key generate rsa label NXOS-FABRIC-DEMO exportable modulus 2048
crypto ca trustpoint DEMO-CA
  enrollment terminal
  rsakeypair NXOS-FABRIC-DEMO
  revocation-check none

! ---- Local Users ----
username admin password <demo_type9_admin_hash> role network-admin
username admin passphrase lifetime 45 warntime 14 gracetime 3
username netops password <demo_type9_netops_hash> role network-operator
username netops passphrase lifetime 99999 warntime 14 gracetime 3

! ---- Banner ----
banner motd #
**************************************************
 AUTHORIZED ACCESS ONLY
 Enterprise DC Fabric Infrastructure
 Activity may be monitored and logged
 **************************************************

#

! ======================================================
! Time and Resolution Services
! ======================================================
ip domain-lookup

vrf context management
  ip domain-name corp.dc.fabric
  ip name-server 10.255.251.10
  ip name-server 10.255.251.11
  ip domain-list corp.dc.fabric
  ip domain-list mgmt.dc.fabric

ntp server 10.255.250.10 use-vrf management prefer

ntp server 10.255.250.11 use-vrf management

ntp server 10.255.250.12 use-vrf management

ntp source-interface mgmt0

ntp authentication-key 10 md5 NTP_SECRET

ntp authenticate

ntp trusted-key 10

ntp logging



! ======================================================
! Local Users (Break-Glass and Service Accounts)
! ======================================================
! Break-glass administrator account
username admin password 5 <demo_type9_admin_hash> role network-admin
username admin passphrase lifetime 45 warntime 14 gracetime 3

! Non-interactive service accounts for SNMP
username netops password 5 <demo_type9_netops_hash> role network-operator
username netops passphrase lifetime 99999 warntime 14 gracetime 3

! ======================================================
! RADIUS Server & Group Configuration
! ======================================================
radius-server host 10.255.252.10 key RADIUS_SECRET authentication accounting
radius-server host 10.255.252.11 key RADIUS_SECRET authentication accounting
radius-server timeout 5
radius-server retransmit 3
radius-server deadtime 15

ip radius source-interface loopback0

aaa group server radius RadiusServers
  server 10.255.252.10
  server 10.255.252.11
  use-vrf management
exit

! ======================================================
! AAA Authentication & Accounting Enforcement
! ======================================================
aaa authentication login default group RadiusServers local
aaa authentication login console group RadiusServers local
aaa accounting default group RadiusServers

! Prevent login if user lacks a defined role
no aaa user default-role

! Command Accounting and Session Logging
aaa accounting commands all default start-stop group RadiusServers
login on-success log
login on-failure log
aaa authentication login error-enable

! ======================================================
! Login Banner
! ======================================================
banner motd ^C
**************************************************
AUTHORIZED ACCESS ONLY
Enterprise DC Fabric Infrastructure
Activity may be monitored and logged
**************************************************
^C

! ---------- SNMP Engine & Global Settings ----------
no snmp-server community public
no snmp-server community private

snmp ifmib ifalias long

snmp-server engineID local 10:A1:A1:00:A1:65:FF:FF:FF:FF:FF:FF
snmp-server globalEnforcePriv
snmp-server contact noc@corp.dc.fabricsnmp-server location Global Data Center Fabric
! ---------- SNMP USERS ----------
snmp-server user snmpv3user network-operator auth sha SNMP_AUTH_SECRET priv aes-128 SNMP_PRIV_SECRET localizedV2key

! ---------- SNMP HOST TRAPS ----------
snmp-server host 10.255.254.10 traps version 3 priv snmpv3user
snmp-server host 10.255.254.10 use-vrf management
snmp-server host 10.255.254.10 source-interface loopback0
snmp-server host 10.255.254.11 traps version 3 priv snmpv3user
snmp-server host 10.255.254.11 use-vrf management
snmp-server host 10.255.254.11 source-interface loopback0

! ---------- RMON EVENTS ----------
rmon event 1 log trap snmptraps description FATAL(1) owner PMON@FATAL
rmon event 2 log trap snmptraps description CRITICAL(2) owner PMON@CRITICAL
rmon event 3 log trap snmptraps description ERROR(3) owner PMON@ERROR
rmon event 4 log trap snmptraps description WARNING(4) owner PMON@WARNING
rmon event 5 log trap snmptraps description INFORMATION(5) owner PMON@INFO

! ---------- SNMP TRAP ENABLEMENTS ----------
snmp-server enable traps config ccmCLIRunningConfigChanged
snmp-server enable traps snmp authentication
snmp-server enable traps lldp lldpRemTablesChange
snmp-server enable traps syslog message-generated

! ======================================================
! Centralized Logging (Syslog over TLS)
! ======================================================

! Enable highly accurate timestamps for event tracking
logging timestamp milliseconds

! Set local monitor logging level
logging monitor 6

! Configure the local logfile buffer size for retention
logging logfile log_file 6 size 4096000

! Define the source interface so syslog traffic originates from OOB management
logging source-interface mgmt0

! Disable strict OCSP checking for the secure logging connection
no logging secure ocsp strict

! Forward logs to the Splunk collector via TLS (secure) using the management VRF
logging server 10.127.127.10 6 secure use-vrf management
! ======================================================
! 1. Control Plane Policing (CoPP)
! ======================================================
copp profile strict

! ======================================================
! 2. Password Hardening and AES Encryption
! ======================================================
password strength-check
feature password encryption aes
password minimum-length 14

! ======================================================
! 3. Traffic Storm Control
! ======================================================

! ======================================================
! 4. Disabling Insecure Services
! ======================================================
no feature telnet
feature ssh

! ======================================================
! 5. Port Security (Optional Layer 2 Hardening)
! ======================================================
! ---------- GLOBAL BASIC SERVICES ----------
license smart transport cslu
license smart url cslu http://10.255.243.10

flow exporter FABRIC-NETFLOW
  destination 10.255.241.10 use-vrf management
  transport udp 2055
  source loopback0

feature telemetry
telemetry
  destination-profile GNMI-1
    destination 10.255.242.10 port 57400 protocol gRPC encoding GPB
  destination-profile GNMI-2
    destination 10.255.242.11 port 57400 protocol gRPC encoding GPB

archive
  path scp://backupuser@10.255.244.10/network-backups
! ---------- TCAM Carving ----------
hardware access-list tcam region ing-racl 512
hardware access-list tcam region egr-racl 768
hardware access-list tcam region ing-l2-qos 1792
hardware access-list tcam region ing-sup 768
hardware access-list tcam region egr-l2-qos 512
! ======================================================
! IS-IS Underlay
! ======================================================
feature isis
feature bfd

router isis FABRIC-UNDERLAY
  net 49.0001.0100.0100.2007.00
  is-type level-2
  log-adjacency-changes
  address-family ipv4 unicast
    maximum-paths 64

interface loopback0
  ip router isis FABRIC-UNDERLAY
  isis passive-interface level-2
! ======================================================
! Multicast (PIM-SM / MSDP) Underlay Configuration
! ======================================================

ip pim rp-address 10.1.6.254 group-list 239.1.0.0/16


interface loopback0
  ip pim sparse-mode
! ---------- FABRIC LOOPBACKS ----------
interface loopback0
  description DC1-P1-LF07 router-id
  ip address 10.1.2.7/32

interface loopback1
  description DC1-P1-LF07 VTEP source
  ip address 10.1.1.137/32

interface nve1
  description VXLAN_VTEP_INTERFACE
  no shutdown
  source-interface loopback1
  host-reachability protocol bgp

! ---------- EVPN OVERLAY ----------
router bgp 65101
  router-id 10.1.2.7
  address-family ipv4 unicast
    maximum-paths 8
  address-family l2vpn evpn
    retain route-target all

  neighbor 10.1.1.1
    remote-as 65101
    update-source loopback0
    description EVPN_RR_TO_DC1-P1-SP01
    address-family l2vpn evpn
      send-community both
  neighbor 10.1.1.2
    remote-as 65101
    update-source loopback0
    description EVPN_RR_TO_DC1-P1-SP02
    address-family l2vpn evpn
      send-community both
  neighbor 10.1.1.3
    remote-as 65101
    update-source loopback0
    description EVPN_RR_TO_DC1-P1-SP03
    address-family l2vpn evpn
      send-community both
  neighbor 10.1.1.4
    remote-as 65101
    update-source loopback0
    description EVPN_RR_TO_DC1-P1-SP04
    address-family l2vpn evpn
      send-community both


! ======================================================
! VXLAN Tenant Multicast-Assisted Overlay Virtualization
! ======================================================

vrf context TENANT-A
  vni 50000
  rd auto
  address-family ipv4 unicast
    route-target both auto
    route-target both auto evpn

vlan 999
  name L3VNI_TENANT_A
  vn-segment 50000

interface vlan 999
  description L3VNI_TENANT_A
  vrf member TENANT-A
  ip forward
  no shutdown

vlan 10
  name WEB_SERVERS
  vn-segment 30010

interface vlan 10
  description WEB_SERVERS_ANYCAST_GW
  vrf member TENANT-A
  ip address 10.10.10.1/24
  fabric forwarding mode anycast-gateway
  no shutdown

interface nve1
  member vni 50000 associate-vrf
  member vni 30010
    mcast-group 239.1.1.10

router bgp 65101
  vrf TENANT-A
    address-family ipv4 unicast
      advertise l2vpn evpn


! ======================================================
! VXLAN Tenant Ingress-Replication Overlay Virtualization
! ======================================================

vrf context TENANT-B
  vni 50100
  rd auto
  address-family ipv4 unicast
    route-target both auto
    route-target both auto evpn

vlan 1099
  name L3VNI_TENANT_B
  vn-segment 50100

interface vlan 1099
  description L3VNI_TENANT_B
  vrf member TENANT-B
  ip forward
  no shutdown

vlan 110
  name APP_SERVERS
  vn-segment 30110

interface vlan 110
  description APP_SERVERS_ANYCAST_GW
  vrf member TENANT-B
  ip address 10.20.10.1/24
  fabric forwarding mode anycast-gateway
  no shutdown

interface nve1
  member vni 50100 associate-vrf
  member vni 30110
    ingress-replication protocol bgp

router bgp 65101
  vrf TENANT-B
    address-family ipv4 unicast
      advertise l2vpn evpn

