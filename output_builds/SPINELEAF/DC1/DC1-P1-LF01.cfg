! ======================================================
! AUTO-GENERATED NX-OS CONFIGURATION - DO NOT EDIT
! Hostname: DC1-P1-LF01
! Fabric ID: DC1-P1-LF01
! Role: LEAF
! Site: DC1 / pod1
! Management IP: 10.1.0.31/16
! Design Note: Server leaf: server-facing ports Eth1/1-10 and fabric uplinks Eth1/49-52.
! Corrected Rule: Super-spines do not connect directly to XR/core.
! Border Rule: Leaf 7 and Leaf 8 provide XR/core handoff using Eth1/53-Eth1/54.
! Inter-DC XR Ring: DC1-XR connects to DC2-XR, DC2-XR connects to DC3-XR, and DC3-XR connects back to DC1-XR.
! ======================================================

hostname DC1-P1-LF01

! ---- System & Features ----
feature scp-server
feature lacp
feature lldp
feature bfd
feature bgp
feature interface-vlan
feature vn-segment-vlan-based
feature nv overlay

fabric forwarding anycast-gateway-mac 0001.0001.0001

! ---- Domain & SSH ----
ip domain-name corp.dc.fabric
clock timezone Australia/Melbourne
ip domain-lookup
feature ssh
ssh login-attempts 3
ssh source-interface loopback0
ssh key rsa 2048
ip ssh version 2

system memory-threshold minor 96
system memory-threshold severe 97
system memory-threshold critical 98

! ---- RSA & Certificate Enrollment ----
crypto key generate rsa label NXOS-FABRIC-DEMO exportable modulus 2048
crypto ca trustpoint DEMO-CA
  enrollment terminal
  rsakeypair NXOS-FABRIC-DEMO
  revocation-check none

! ---- Local Users ----
username admin password <demo_type9_admin_hash> role network-admin
username admin passphrase lifetime 45 warntime 14 gracetime 3
username netops password <demo_type9_netops_hash> role network-operator
username netops passphrase lifetime 99999 warntime 14 gracetime 3

! ---- Banner ----
banner motd #
**************************************************
 AUTHORIZED ACCESS ONLY
 Enterprise DC Fabric Infrastructure
 Activity may be monitored and logged
 **************************************************

#

! ---------- RADIUS SERVER CONFIG ----------
radius-server host 10.255.252.10 key RADIUS_SECRET authentication accounting
radius-server host 10.255.252.11 key RADIUS_SECRET authentication accounting

radius-server timeout 5
radius-server retransmit 3
radius-server deadtime 15


ip radius source-interface loopback0

! ---------- RADIUS GROUP ----------
aaa group server radius RadiusServers
  server 10.255.252.10
  server 10.255.252.11
  use-vrf management

! ---------- AAA AUTHENTICATION / ACCOUNTING ----------
aaa authentication login default group RadiusServers local
aaa authentication login console group RadiusServers local
aaa authentication enable default group RadiusServers local
aaa authorization exec default group RadiusServers local
aaa authorization commands default group RadiusServers local
aaa accounting default group RadiusServers

login on-success log
login on-failure log
aaa authentication login error-enable
no aaa user default-role

! ---------- COMMAND ACCOUNTING ----------
aaa accounting commands all default start-stop group RadiusServers

feature password encryption aes


! ---------- SNMP Engine & Global Settings ----------
no snmp-server community public
no snmp-server community private

snmp ifmib ifalias long

snmp-server engineID local 10:A1:A0:A3:1F:FF:FF:FF:FF:FF:FF:FF
snmp-server globalEnforcePriv
snmp-server contact noc@corp.dc.fabricsnmp-server location Global Data Center Fabric
! ---------- SNMP USERS ----------
snmp-server user snmpv3user network-operator auth sha SNMP_AUTH_SECRET priv aes-128 SNMP_PRIV_SECRET localizedV2key

! ---------- SNMP HOST TRAPS ----------
snmp-server host 10.255.254.10 traps version 3 priv snmpv3user
snmp-server host 10.255.254.10 use-vrf management
snmp-server host 10.255.254.10 source-interface loopback0
snmp-server host 10.255.254.11 traps version 3 priv snmpv3user
snmp-server host 10.255.254.11 use-vrf management
snmp-server host 10.255.254.11 source-interface loopback0

! ---------- RMON EVENTS ----------
rmon event 1 log trap snmptraps description FATAL(1) owner PMON@FATAL
rmon event 2 log trap snmptraps description CRITICAL(2) owner PMON@CRITICAL
rmon event 3 log trap snmptraps description ERROR(3) owner PMON@ERROR
rmon event 4 log trap snmptraps description WARNING(4) owner PMON@WARNING
rmon event 5 log trap snmptraps description INFORMATION(5) owner PMON@INFO

! ---------- SNMP TRAP ENABLEMENTS ----------
snmp-server enable traps config ccmCLIRunningConfigChanged
snmp-server enable traps snmp authentication
snmp-server enable traps lldp lldpRemTablesChange
snmp-server enable traps syslog message-generated

! ---------- NTP CONFIGURATION ----------
ntp server 10.255.250.10 use-vrf management prefer

ntp server 10.255.250.11 use-vrf management

ntp server 10.255.250.12 use-vrf management


ntp source-interface loopback0

ntp authentication-key 10 md5 NTP_SECRET
ntp authenticate
ntp trusted-key 10

ntp logging


! ---------- LOGGING CONFIGURATION ----------
logging console 5
logging origin-id hostname
logging monitor 6
logging buffered 4096000 warnings
logging logfile log_file 6 size 4096000
logging server 10.255.240.10 informational secure use-vrf management
logging server 10.255.240.10 port 6514
logging server 10.255.240.11 informational secure use-vrf management
logging server 10.255.240.11 port 6514
logging ip access-list cache interval 300
logging ip access-list cache entries 8000
logging ip access-list detailed
hardware rate-limiter access-list-log 50
logging source-interface loopback0
logging timestamp milliseconds
logging module 3
no logging secure ocsp strict
! ---------- GLOBAL BASIC SERVICES ----------
license smart transport cslu
license smart url cslu http://10.255.243.10

flow exporter FABRIC-NETFLOW
  destination 10.255.241.10 use-vrf management
  transport udp 2055
  source loopback0

feature telemetry
telemetry
  destination-profile GNMI-1
    destination 10.255.242.10 port 57400 protocol gRPC encoding GPB
  destination-profile GNMI-2
    destination 10.255.242.11 port 57400 protocol gRPC encoding GPB

archive
  path scp://backupuser@10.255.244.10/network-backups
! ---------- TCAM Carving ----------
hardware access-list tcam region ing-racl 512
hardware access-list tcam region egr-racl 768
hardware access-list tcam region ing-l2-qos 1792
hardware access-list tcam region ing-sup 768
hardware access-list tcam region egr-l2-qos 512
hardware access-list tcam region egr-l3-vlan-qos 512

! ---------- Ingress QoS ----------
class-map type qos match-any NETWORK-CONTROL
  match dscp 48
  match dscp 56
class-map type qos match-any REALTIME
  match dscp 46
class-map type qos match-any CRITICAL-OPERATIONAL
  match dscp 36
class-map type qos match-any TRANSACTIONAL-DATA
  match dscp 18
class-map type qos match-any BEST-EFFORT
  match dscp 0

policy-map type qos FABRIC-TRUST-DSCP
  class NETWORK-CONTROL
    set qos-group 7
  class REALTIME
    set qos-group 6
  class CRITICAL-OPERATIONAL
    set qos-group 5
  class TRANSACTIONAL-DATA
    set qos-group 2
  class BEST-EFFORT
    set qos-group 1
  class class-default
    set qos-group 1

! ---------- Egress Queuing Policy ----------
policy-map type queuing FABRIC-8Q-OUT
  class type queuing c-out-8q-q7
    priority level 1
  class type queuing c-out-8q-q6
    bandwidth remaining percent 20
  class type queuing c-out-8q-q5
    bandwidth remaining percent 20
  class type queuing c-out-8q-q2
    bandwidth remaining percent 20
  class type queuing c-out-8q-q1
    bandwidth remaining percent 20
  class type queuing c-out-8q-q-default
    bandwidth remaining percent 20
! ---------- STP ----------
spanning-tree mode rapid-pvst
spanning-tree port type edge default
spanning-tree port type edge bpduguard default
spanning-tree vlan 10-99,100-199,300-399 priority 24576
# ============================
# mgmt VRF and Gateway
# ============================
interface mgmt0
  description OOB Management
  vrf member management
  ip address 10.1.0.31/16
  ip access-group mgmt_acl_in in
  ip access-group mgmt_acl_out out
  no shutdown

vrf context management
  ip route 0.0.0.0/0 10.1.0.1

ip name-server 10.255.251.10 10.255.251.11 use-vrf management
ip domain-list corp.dc.fabric
ip domain-list mgmt.dc.fabric



