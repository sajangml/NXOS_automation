! ======================================================
! ROUTING POLICY CONFIGURATION
! ======================================================

! ---------- EXTERNAL CORE BGP ----------
router bgp 65103

! ---------- eBGP DCI PEERING (BORDER GATEWAYS ONLY) ----------

! ======================================================
! Management Access Control (Object Groups)
! ======================================================
object-group ip address ssh_sources
  10 10.10.10.0/24
  20 10.20.20.0/24

object-group ip address monitor_sources
  10 10.30.30.0/24

! ======================================================
! Inbound Management ACL (mgmt_acl_in)
! ======================================================
ip access-list mgmt_acl_in
  statistics per-entry
  10 remark ### SSH from authorised sources
  20 permit tcp addrgroup ssh_sources any eq 22
  30 remark ### SNMPv3 polling from LogicMonitor collectors
  40 permit udp addrgroup monitor_sources any eq 161
  50 remark ### NTP response traffic
  60 permit udp 10.255.250.10/32 eq 123 any
  70 permit udp 10.255.250.11/32 eq 123 any
  80 permit udp 10.255.250.12/32 eq 123 any
  90 remark ### DNS response traffic
  100 permit udp 10.255.251.10/32 eq 53 any
  110 permit udp 10.255.251.11/32 eq 53 any
  120 remark ### ICMP reachability monitoring from LogicMonitor collectors
  130 permit icmp addrgroup monitor_sources any echo
  140 permit icmp addrgroup monitor_sources any echo-reply
  150 permit icmp addrgroup monitor_sources any time-exceeded
  160 permit icmp addrgroup monitor_sources any unreachable
  170 remark ### RADIUS response traffic
  180 permit udp 10.255.252.10/32 eq 1812 any
  190 permit udp 10.255.252.10/32 eq 1813 any
  200 permit udp 10.255.252.11/32 eq 1812 any
  210 permit udp 10.255.252.11/32 eq 1813 any
  220 remark ### return traffic for switch-initiated TCP sessions
  230 permit tcp any any established
  240 remark ### default deny - all other inbound traffic denied
  250 deny ip any any log

! ======================================================
! Outbound Management ACL (mgmt_acl_out)
! ======================================================
ip access-list mgmt_acl_out
  statistics per-entry
  10 remark ### SNMP traps to Splunk and LogicMonitor
  20 permit udp any 10.255.254.10/32 eq 162
  30 permit udp any 10.255.254.11/32 eq 162
  40 remark ### SNMPv3 polling responses to LogicMonitor collectors
  50 permit udp any eq 161 addrgroup monitor_sources
  60 remark ### ICMP reachability responses to LogicMonitor collectors
  70 permit icmp any addrgroup monitor_sources echo-reply
  80 permit icmp any addrgroup monitor_sources unreachable
  90 permit icmp any addrgroup monitor_sources time-exceeded
  100 remark ### Syslog over TLS to Splunk
  110 permit tcp any 10.255.240.10/32 eq 6514
  120 permit tcp any 10.255.240.11/32 eq 6514
  130 remark ### RADIUS authentication
  140 permit udp any 10.255.252.10/32 eq 1812
  150 permit udp any 10.255.252.11/32 eq 1812
  160 remark ### RADIUS accounting
  170 permit udp any 10.255.252.10/32 eq 1813
  180 permit udp any 10.255.252.11/32 eq 1813
  190 remark ### NTP to time server
  200 permit udp any 10.255.250.10/32 eq 123
  210 permit udp any 10.255.250.11/32 eq 123
  220 permit udp any 10.255.250.12/32 eq 123
  230 remark ### DNS resolution
  240 permit udp any 10.255.251.10/32 eq 53
  250 permit tcp any 10.255.251.10/32 eq 53
  260 permit udp any 10.255.251.11/32 eq 53
  270 permit tcp any 10.255.251.11/32 eq 53
  280 remark ### Smart Licensing HTTPS to CSLU
  290 permit tcp any 10.255.243.10/32 eq 443
  300 remark ### return traffic for inbound TCP sessions
  310 permit tcp any any established
  320 remark ### default deny - all other outbound traffic denied
  330 deny ip any any

! ======================================================
! VTY SSH-only ACL
! ======================================================
ip access-list vty_acl_in
  10 remark ### SSH from authorised sources only
  20 permit tcp addrgroup ssh_sources any eq 22
  30 remark ### default deny
  40 deny ip any any log

! ======================================================
! Applying the ACLs to Interfaces and Lines
! ======================================================
interface mgmt0
  ip access-group mgmt_acl_in in
  ip access-group mgmt_acl_out out

line console
line vty
  ip access-class vty_acl_in in
boot nxos bootflash:/nxos64-cs.10.3.6.M.bin

