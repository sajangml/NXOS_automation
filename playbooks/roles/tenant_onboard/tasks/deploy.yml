---
- name: Phase 3 - Find generated configuration for host
  ansible.builtin.set_fact:
    # Gets DC1, DC2, or DC3 from the hostname (e.g. DC1-P1-LF01 -> DC1)
    config_file: "../output_builds/SPINELEAF/{{ inventory_hostname.split('-')[0] }}/{{ inventory_hostname }}.cfg"

- name: Phase 3 - Verify configuration file exists
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/{{ config_file }}"
  register: config_stat
  delegate_to: localhost

- name: Phase 3 - Fail if configuration file is missing
  ansible.builtin.fail:
    msg: "Configuration file for {{ inventory_hostname }} not found at {{ playbook_dir }}/{{ config_file }}"
  when: not config_stat.stat.exists

- name: Phase 3 - Deploy configuration to switch
  cisco.nxos.nxos_config:
    src: "{{ playbook_dir }}/{{ config_file }}"
    save_when: modified
